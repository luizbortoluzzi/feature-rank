name: CI

on:
  push:
  pull_request:
    branches: [main]

jobs:
  # ---------------------------------------------------------------------------
  # Repository structure check
  # Validates that required root files and directories are present.
  # ---------------------------------------------------------------------------
  structure:
    name: Repository structure
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Check required files
        run: |
          required_files=(
            README.md
            CLAUDE.md
            CONTRIBUTING.md
            .env.example
            .editorconfig
            .gitignore
            .pre-commit-config.yaml
            Makefile
          )

          required_dirs=(
            frontend
            backend
            docs
            .github/workflows
          )

          all_ok=true

          for f in "${required_files[@]}"; do
            if [ ! -f "$f" ]; then
              echo "::error::Required file missing: $f"
              all_ok=false
            else
              echo "OK  $f"
            fi
          done

          for d in "${required_dirs[@]}"; do
            if [ ! -d "$d" ]; then
              echo "::error::Required directory missing: $d"
              all_ok=false
            else
              echo "OK  $d/"
            fi
          done

          if [ "$all_ok" = false ]; then
            exit 1
          fi

          echo "All required files and directories are present."

      - name: Check .env.example contains no real secrets
        run: |
          if grep -qE 'SECRET_KEY\s*=\s*[^<]' .env.example; then
            echo "::error::.env.example may contain a real SECRET_KEY value"
            exit 1
          fi
          echo ".env.example looks clean."

  # ---------------------------------------------------------------------------
  # Pre-commit hooks
  # Runs file hygiene, black, and ruff hooks. Frontend lint/type-check are
  # skipped here — they are covered by the dedicated frontend-quality job.
  # ---------------------------------------------------------------------------
  pre-commit:
    name: Pre-commit hooks
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Run pre-commit hooks
        uses: pre-commit/action@v3.0.1
        env:
          SKIP: frontend-lint,frontend-typecheck

  # ---------------------------------------------------------------------------
  # Frontend quality
  # Type-checking, linting, formatting, unit tests, and production build.
  # ---------------------------------------------------------------------------
  frontend-quality:
    name: Frontend quality
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        working-directory: frontend
        run: npm ci

      - name: Type check
        working-directory: frontend
        run: npm run type-check

      - name: Lint
        working-directory: frontend
        run: npm run lint

      - name: Format check
        working-directory: frontend
        run: npm run format:check

      - name: Tests
        working-directory: frontend
        run: npm run test -- --run

      - name: Build
        working-directory: frontend
        env:
          VITE_API_BASE_URL: http://localhost:8000
        run: npm run build

  # ---------------------------------------------------------------------------
  # Backend tests
  # Runs the full pytest suite against an in-memory SQLite database.
  # MySQL is not required in CI — the test settings module swaps it out.
  # Coverage must remain at or above 80%.
  # ---------------------------------------------------------------------------
  backend-tests:
    name: Backend tests
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: "pip"

      - name: Install system dependencies
        run: sudo apt-get install -y libmysqlclient-dev

      - name: Install Python dependencies
        working-directory: backend
        run: pip install -e ".[dev]"

      - name: Lint
        working-directory: backend
        run: ruff check .

      - name: Format check
        working-directory: backend
        run: ruff format --check .

      - name: Run tests with coverage
        working-directory: backend
        run: pytest --cov=apps --cov-report=term-missing --cov-fail-under=80
