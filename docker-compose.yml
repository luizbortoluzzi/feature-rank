# Development docker-compose — all services with hot-reload and DB port exposed.
# Usage: docker compose up --build
# Requires a .env file at repo root (copy .env.example to .env and fill in values).

networks:
  feature_rank_net:
    driver: bridge

volumes:
  mysql_data:

services:

  # ── MySQL 8.4 database ──────────────────────────────────────────────────────
  db:
    image: mysql:8.4
    environment:
      MYSQL_DATABASE: ${MYSQL_DATABASE}
      MYSQL_USER: ${MYSQL_USER}
      MYSQL_PASSWORD: ${MYSQL_PASSWORD}
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD}
    ports:
      - "3306:3306"
    volumes:
      - mysql_data:/var/lib/mysql
      - ./docker/mysql:/docker-entrypoint-initdb.d:ro
    networks:
      - feature_rank_net
    healthcheck:
      test: ["CMD-SHELL", "mysqladmin ping -h localhost -u root -p\"$$MYSQL_ROOT_PASSWORD\" --silent 2>/dev/null"]
      interval: 10s
      timeout: 5s
      retries: 6
      start_period: 60s

  # ── Django backend — development server with hot-reload ────────────────────
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    environment:
      DATABASE_URL: mysql://${MYSQL_USER}:${MYSQL_PASSWORD}@db:3306/${MYSQL_DATABASE}
      DB_HOST: db
      DB_PORT: "3306"
      DJANGO_SECRET_KEY: ${DJANGO_SECRET_KEY}
      DJANGO_ALLOWED_HOSTS: ${DJANGO_ALLOWED_HOSTS:-localhost,127.0.0.1,backend}
      DJANGO_SETTINGS_MODULE: config.settings.development
      DJANGO_ENV: development
      CORS_ALLOWED_ORIGINS: ${CORS_ALLOWED_ORIGINS:-http://localhost:5173}
      MYSQL_USER: ${MYSQL_USER}
      MYSQL_PASSWORD: ${MYSQL_PASSWORD}
    volumes:
      - ./backend:/app
    ports:
      - "8000:8000"
    networks:
      - feature_rank_net
    depends_on:
      db:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "python -c \"import urllib.request; urllib.request.urlopen('http://localhost:8000/api/')\" 2>/dev/null || exit 0"]
      interval: 15s
      timeout: 5s
      retries: 3
      start_period: 30s

