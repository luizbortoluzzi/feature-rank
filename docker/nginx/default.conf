server {
    listen 80;
    server_name _;

    root /usr/share/nginx/html;
    index index.html;

    # Security headers
    add_header X-Frame-Options "DENY" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    add_header Content-Security-Policy "default-src 'self'; script-src 'self' 'unsafe-inline'; style-src 'self' 'unsafe-inline'; img-src 'self' data: blob:; font-src 'self'; connect-src 'self';" always;

    # Health check endpoint — no logging
    location /healthz {
        access_log off;
        return 200 "OK\n";
        add_header Content-Type text/plain;
    }

    # API proxy — forward all /api/ and /admin/ requests to the Django backend.
    # X-Forwarded-Proto is passed through from the upstream reverse proxy (Traefik)
    # so Django's SECURE_PROXY_SSL_HEADER correctly identifies HTTPS requests.
    location ~ ^/(api|admin)/ {
        proxy_pass http://backend:8000;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $http_x_forwarded_proto;
        proxy_read_timeout 60s;
        proxy_connect_timeout 10s;
        proxy_send_timeout 60s;
        # Remove security headers for proxied responses — Django sets its own
        proxy_hide_header X-Frame-Options;
    }

    # SPA fallback — serve index.html for all unknown routes so React Router
    # can handle client-side navigation
    location / {
        try_files $uri $uri/ /index.html;
    }

    # Cache static assets aggressively — Vite injects content hashes into
    # filenames so assets are safe to cache indefinitely
    location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|woff|woff2|ttf|eot|webp)$ {
        expires 1y;
        add_header Cache-Control "public, immutable";
        access_log off;
    }
}
